  <rect x="96" y="402" width="120" height="4" rx="2" fill="#1A1A1A"/><rect x="96" y="402" width="100" height="4" rx="2" fill="#98FF98"/>
  <text x="248" y="408" font-size="9" font-weight="500" fill="#FFFFFF" text-anchor="end">7H 48M</text>
